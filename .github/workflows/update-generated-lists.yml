name: Update RouterOS service lists

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate RouterOS service lists
        run: |
          chmod +x scripts/build-all.sh
          ./scripts/build-all.sh

      - name: Validate generated files
        run: |
          chmod +x scripts/validate-all.sh
          ./scripts/validate-all.sh

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add services/*/output/list-domains.rsc services/*/output/list-cidr.rsc services/*/output/list-all.rsc profiles/ai-to-outbound/output/list-all.rsc profiles/developer-to-outbound/output/list-all.rsc profiles/package-repositories-to-outbound/output/list-all.rsc profiles/cloud-storage-to-outbound/output/list-all.rsc profiles/video-streaming-to-outbound/output/list-all.rsc profiles/google-services-to-outbound/output/list-all.rsc profiles/music-to-outbound/output/list-all.rsc profiles/gaming-to-outbound/output/list-all.rsc profiles/design-to-outbound/output/list-all.rsc profiles/messaging-to-outbound/output/list-all.rsc profiles/social-media-to-outbound/output/list-all.rsc profiles/primary-to-outbound/output/list-all.rsc

          if git diff --cached --quiet; then
            echo "No service list changes"
          else
            git commit -m "Automatic service list update"
            git push
          fi
