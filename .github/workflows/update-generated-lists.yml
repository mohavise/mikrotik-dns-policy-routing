name: Update RouterOS service lists

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare scripts
        run: |
          chmod +x scripts/*.sh
          find categories -path '*/scripts/*.sh' -type f -exec chmod +x {} \;

      - name: Generate RouterOS service lists
        run: |
          ./scripts/build-all.sh

      - name: Validate generated files
        run: |
          ./scripts/validate-all.sh

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          find categories -path '*/output/*.rsc' -type f -print0 | xargs -0 git add

          if git diff --cached --quiet; then
            echo "No service list changes"
          else
            git commit -m "Automatic service list update"
            git push
          fi
