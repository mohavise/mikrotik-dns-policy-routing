name: Update Telegram RouterOS lists

on:
  schedule:
    - cron: "40 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Telegram RouterOS lists
        run: |
          chmod +x services/telegram/scripts/build.sh
          ./services/telegram/scripts/build.sh

      - name: Validate generated files
        run: |
          chmod +x services/telegram/scripts/validate.sh
          ./services/telegram/scripts/validate.sh

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add services/telegram/output/list-domains.rsc services/telegram/output/list-cidr.rsc services/telegram/output/list-all.rsc

          if git diff --cached --quiet; then
            echo "No Telegram list changes"
          else
            git commit -m "Automatic Telegram list update"
            git push
          fi
